name: Code Quality Check

# Triggers the workflow on push or pull request events for the "main" branch
on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  lint-and-type-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10" # Matches your local development environment

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff mypy
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: First Defense - Run Ruff (Linting & Formatting)
        run: ruff check .

      - name: Second Defense - Run Mypy (Static Type Checking)
        # --ignore-missing-imports is used because some libraries (e.g., pandas) lack type hints by default
        run: mypy . --ignore-missing-imports
